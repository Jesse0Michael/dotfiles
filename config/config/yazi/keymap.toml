[mgr]
prepend_keymap = [
  # Bookmarks — g + key to jump
  { on = ["g", "b"], run = "cd ~/code/github.com/airtimemedia/backend", desc = "Go to backend" },
  { on = ["g", "c"], run = "cd ~/code/github.com/jesse0michael", desc = "Go to code" },
  { on = ["g", "r"], run = "cd ~/code/github.com/raineystreetgames", desc = "Go to raineystreetgames" },
  { on = ["g", "k"], run = "cd ~/code/github.com/raineystreetgames/kithwind", desc = "Go to kithwind" },
  { on = ["g", "d"], run = "cd ~/Downloads", desc = "Go to Downloads" },
  { on = ["g", "D"], run = "cd ~/Desktop", desc = "Go to Desktop" },
  { on = ["g", "o"], run = "cd ~/Documents", desc = "Go to Documents" },
  { on = ["g", "h"], run = "cd ~", desc = "Go to home" },
]
